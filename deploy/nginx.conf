# nginx reverse proxy for Bible Pointer (alternative to Caddy).
#
# Setup:
#   1. sudo apt install nginx
#   2. Put this file at /etc/nginx/sites-available/bible-pointer
#      (edit your-domain.com), then:
#        sudo ln -s /etc/nginx/sites-available/bible-pointer /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
#   3. Get a free HTTPS cert (auto-edits this file to add the TLS + redirect):
#        sudo apt install certbot python3-certbot-nginx
#        sudo certbot --nginx -d your-domain.com
#      certbot also sets up auto-renewal.
#
# The server.py backend listens on 127.0.0.1:8080 (see the systemd unit).

server {
    listen 80;
    server_name your-domain.com;

    # The Vosk voice WebSocket — MUST forward the upgrade headers or it won't work.
    location /asr {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;     # keep the long-lived voice socket open
        proxy_send_timeout 3600s;
    }

    # Everything else (dashboard, /auth, /billing, static files)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
