<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bible Pointer - Presentation Display</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f0f15 0%, #050508 100%);
      --gold-primary: #d4af37;
      --gold-glow: rgba(212, 175, 55, 0.2);
      --color-text-primary: #f0f0f5;
      --color-text-secondary: #a0a0b0;
      --card-bg: rgba(20, 20, 28, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Outfit', 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--color-text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      overflow-x: hidden;
      text-align: center;
    }

    .display-container {
      width: 100%;
      max-width: 1100px;
      margin: auto;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 3.5rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px var(--gold-glow);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      transform: translateY(20px);
    }

    .display-container.active {
      opacity: 1;
      transform: translateY(0);
    }

    .reference-title {
      font-size: 2.8rem;
      font-weight: 800;
      color: var(--gold-primary);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 2rem;
      text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
    }

    .verses-container {
      font-size: 1.9rem;
      line-height: 1.7;
      font-weight: 300;
      color: var(--color-text-primary);
      max-height: 60vh;
      overflow-y: auto;
      padding-right: 1.5rem;
      text-align: left;
    }

    /* Scrollbar Styling */
    .verses-container::-webkit-scrollbar {
      width: 8px;
    }
    .verses-container::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 4px;
    }
    .verses-container::-webkit-scrollbar-thumb {
      background: rgba(212, 175, 55, 0.3);
      border-radius: 4px;
    }
    .verses-container::-webkit-scrollbar-thumb:hover {
      background: var(--gold-primary);
    }

    .verse-item {
      margin-bottom: 1.8rem;
      opacity: 0;
      animation: fadeIn 0.8s forwards;
    }

    .verse-number {
      font-weight: 800;
      color: var(--gold-primary);
      font-size: 1.4rem;
      vertical-align: super;
      margin-right: 0.6rem;
    }

    .empty-state {
      font-size: 1.8rem;
      color: var(--color-text-secondary);
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      fill: none;
      stroke: var(--gold-primary);
      stroke-width: 1.5;
      opacity: 0.6;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
  </style>
</head>
<body>
  <div class="display-container" id="display-card">
    <div class="empty-state" id="empty-state">
      <svg viewBox="0 0 24 24">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
      <h2 id="empty-title-text" style="font-size: 2.8rem; font-weight: 800; color: var(--gold-primary); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3); margin-top: 1rem; transition: opacity 0.5s ease;">Welcome to Bible Pointer</h2>
      <p id="empty-subtitle-text" style="font-size: 1.3rem; color: var(--color-text-secondary); font-weight: 300; margin-top: 0.5rem;">Waiting for scripture...</p>
    </div>
    
    <div id="content-area" style="display: none;">
      <h1 class="reference-title" id="ref-title">Genesis 1:1</h1>
      <div class="verses-container" id="verses-content">
        <!-- Dynamic verses list will go here -->
      </div>
    </div>
  </div>

  <script>
    const displayCard = document.getElementById('display-card');
    const emptyState = document.getElementById('empty-state');
    const contentArea = document.getElementById('content-area');
    const refTitle = document.getElementById('ref-title');
    const versesContent = document.getElementById('verses-content');
    const emptyTitleText = document.getElementById('empty-title-text');

    let defaultTitle = localStorage.getItem('bible_display_default_title') || "Welcome to Bible Pointer";
    let idleTimer = null;
    const IDLE_TIMEOUT_DURATION = 120000; // 2 minutes (120000ms)

    function updateIdleTitleDisplay() {
      if (emptyTitleText) {
        emptyTitleText.textContent = defaultTitle;
      }
    }

    // Set initial custom default title on load
    updateIdleTitleDisplay();

    // Make display-card visible immediately with a smooth fade-in
    setTimeout(() => {
      displayCard.classList.add('active');
    }, 100);

    function showScriptureView(title, verses) {
      // Clear any active idle timer
      if (idleTimer) {
        clearTimeout(idleTimer);
        idleTimer = null;
      }

      // Smooth slide-out of idle landing slide if visible
      if (emptyState.style.display !== 'none') {
        emptyState.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
        emptyState.style.opacity = '0';
        emptyState.style.transform = 'translateY(-15px)';
        
        setTimeout(() => {
          emptyState.style.display = 'none';
          renderAndFadeInScripture(title, verses);
        }, 400);
      } else {
        renderAndFadeInScripture(title, verses);
      }
    }

    function renderAndFadeInScripture(title, verses) {
      refTitle.textContent = title;
      versesContent.innerHTML = '';
      
      verses.forEach((v, index) => {
        const div = document.createElement('div');
        div.className = 'verse-item';
        div.style.animationDelay = `${index * 0.08}s`;
        
        const numSpan = document.createElement('span');
        numSpan.className = 'verse-number';
        numSpan.textContent = v.number;
        
        const textSpan = document.createElement('span');
        textSpan.textContent = v.text;
        
        div.appendChild(numSpan);
        div.appendChild(textSpan);
        versesContent.appendChild(div);
      });
      
      versesContent.scrollTop = 0;
      
      // Make sure card display matches active state styling
      contentArea.style.display = 'block';
      contentArea.style.opacity = '0';
      contentArea.style.transform = 'translateY(15px)';
      contentArea.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      
      setTimeout(() => {
        contentArea.style.opacity = '1';
        contentArea.style.transform = 'translateY(0)';
      }, 50);

      // Start new 2-minute countdown timer
      idleTimer = setTimeout(() => {
        showIdleView();
      }, IDLE_TIMEOUT_DURATION);
    }

    function showIdleView() {
      // Smooth slide-out active scripture display
      contentArea.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      contentArea.style.opacity = '0';
      contentArea.style.transform = 'translateY(-15px)';
      
      setTimeout(() => {
        contentArea.style.display = 'none';
        
        // Prepare and slide-in idle landing slide
        emptyState.style.display = 'flex';
        emptyState.style.flexDirection = 'column';
        emptyState.style.alignItems = 'center';
        emptyState.style.opacity = '0';
        emptyState.style.transform = 'translateY(15px)';
        emptyState.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
        
        setTimeout(() => {
          emptyState.style.opacity = '1';
          emptyState.style.transform = 'translateY(0)';
        }, 50);
      }, 500);
    }

    // Set up Broadcast Channel receiver
    const bc = new BroadcastChannel('bible_pointer_channel');
    bc.onmessage = (event) => {
      if (event.data.type === 'update_scripture') {
        const { title, verses } = event.data;
        showScriptureView(title, verses);
      } else if (event.data.type === 'update_default_title') {
        defaultTitle = event.data.title;
        localStorage.setItem('bible_display_default_title', defaultTitle);
        updateIdleTitleDisplay();
      }
    };
  </script>
</body>
</html>
